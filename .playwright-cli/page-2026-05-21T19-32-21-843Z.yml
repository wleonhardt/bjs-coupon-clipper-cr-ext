                        - textbox "Description*" [ref=e278]:
                          - /placeholder: ""
                          - text: "Tired of manually clicking every coupon on BJ's Wholesale Club? BJ's Auto Coupon Clipper does it for you automatically. Visit the BJ's coupons page, press Start, and the extension scrolls through the page, clips every available coupon, and recovers from common loading hiccups along the way. Clean interface. No clutter. No tracking. Features: - One-click control with a Start/Cancel button - Automatically scrolls and clips all available coupons - Recovers from errors like \"Please refresh the page\" - Real-time status updates: Idle, Ready, Clipping, Complete - Secure and lightweight: no trackers, no third-party code - Styled to feel native to BJ's, without using BJ's branding How to use: 1. Go to the BJ's coupons page. 2. Click the extension icon in your Chrome toolbar. 3. Press Start to begin clipping. 4. Press Cancel to stop at any time. The extension will scroll, clip, and refresh the page as needed. No extra setup required. Built with native WebExtension APIs."
